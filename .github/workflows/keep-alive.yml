name: keep-alive

# Pings the Render backend so its free-tier web service doesn't spin down
# (Render sleeps a free service after ~15 min without inbound traffic, which
# would stop the market feed, the WebSocket server and the trading bot).
on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes (GitHub may run it a bit late)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          for i in 1 2 3; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 120 \
              https://trade-desk-api.onrender.com/api/health || echo 000)
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
          echo "backend did not return 200 after 3 attempts"
          exit 1
